<!doctype html>
<html lang="en" style="background-color: {{ background_color|default:'#f5f7fb' }};">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mealplan Questionnaire{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
</head>
<body style="min-height: 100vh; background-color: {{ background_color|default:'#f5f7fb' }};">
    <main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;">
        <section style="width: min(100%, 760px); height: min(92vh, 820px); display: flex; flex-direction: column; background: #ffffff; border-radius: 8px; box-shadow: 0 12px 32px rgba(20, 28, 38, .14); overflow: hidden;">
            {% block content %}{% endblock %}
        </section>
    </main>
</body>
</html>
